name: Deploy afo-mobile-terminal-mcp

on:
  push:
    branches:
      - main
    paths:
      - 'workers/afo-mobile-terminal-mcp/**'
      - '.github/workflows/deploy-afo-mobile-terminal-mcp.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: workers/afo-mobile-terminal-mcp
