name: Deploy afo-mobile-deploy-mcp

on:
  push:
    branches:
      - main
    paths:
      - 'workers/afo-mobile-deploy-mcp/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via Wrangler Action
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/afo-mobile-deploy-mcp
          wranglerVersion: '3.114.7'

      - name: Verify /health
        run: |
          echo "Waiting 5s for Worker to propagate..."
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://afo-mobile-deploy-mcp.jaredtechfit.workers.dev/health)
          echo "/health → HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ /health did not return 200"
            exit 1
          fi
          echo "✅ /health OK"

      - name: Verify /llms.txt
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://afo-mobile-deploy-mcp.jaredtechfit.workers.dev/llms.txt)
          echo "/llms.txt → HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ /llms.txt did not return 200"
            exit 1
          fi
          echo "✅ /llms.txt OK"

      - name: Verify /tools/list
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}' \
            https://afo-mobile-deploy-mcp.jaredtechfit.workers.dev/mcp)
          echo "/tools/list response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"tools"'; then
            echo "✅ /tools/list returned tools array"
          else
            echo "❌ /tools/list did not return expected tools array"
            exit 1
          fi

      - name: Summary
        if: success()
        run: |
          echo "## ✅ afo-mobile-deploy-mcp deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Route | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| [/health](https://afo-mobile-deploy-mcp.jaredtechfit.workers.dev/health) | ✅ 200 |" >> $GITHUB_STEP_SUMMARY
          echo "| [/llms.txt](https://afo-mobile-deploy-mcp.jaredtechfit.workers.dev/llms.txt) | ✅ 200 |" >> $GITHUB_STEP_SUMMARY
          echo "| [/tools/list](https://afo-mobile-deploy-mcp.jaredtechfit.workers.dev/mcp) | ✅ tools array |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ Runtime secrets still needed" >> $GITHUB_STEP_SUMMARY
          echo "Set these in Cloudflare Dashboard → Workers → afo-mobile-deploy-mcp → Settings → Variables:" >> $GITHUB_STEP_SUMMARY
          echo "- \`GITHUB_TOKEN\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`CF_ACCOUNT_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`CF_API_TOKEN\`" >> $GITHUB_STEP_SUMMARY
