name: Deploy afo-biz-inject-mcp

on:
  push:
    branches: [main]
    paths:
      - 'workers/afo-biz-inject-mcp/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy afo-biz-inject-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy
        run: npx wrangler deploy
        working-directory: workers/afo-biz-inject-mcp
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
