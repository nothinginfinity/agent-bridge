name = "afo-mobile-terminal-mcp"
main = "src/index.js"
compatibility_date = "2026-06-01"
workers_dev = true

[vars]
CF_WORKERS_SUBDOMAIN = "jaredtechfit"

# Service binding for Worker-to-Worker calls.
# Bypasses workers.dev (which returns Cloudflare error 1042 when called
# from inside another Worker runtime). Calls go over the internal
# Cloudflare network instead — no public HTTP needed.
[[services]]
binding = "DEPLOY_MCP"
service = "afo-mobile-deploy-mcp"
